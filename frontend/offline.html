<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Glasstrut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>[v-cloak]{display:none}</style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-slate-100 min-h-screen flex items-center justify-center p-6">
  <div class="text-center max-w-sm">
    <div class="text-6xl mb-4">📡</div>
    <h1 class="text-2xl font-extrabold text-indigo-950 mb-2">You're offline</h1>
    <p class="text-slate-600 mb-6">Activities you log will be queued and synced automatically when you reconnect.</p>
    <button onclick="window.location.reload()" class="inline-block py-3 px-6 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors">Try Again</button>
  </div>
</body>
</html>
