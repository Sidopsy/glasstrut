<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="/manifest.json">
  <title>Glasstrut</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Glasstrut</h1>
    <nav>
      <a href="/">Home</a>
    </nav>
  </header>
  <main>
    <section id="auth-section">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <h2>Register</h2>
      <form id="register-form">
        <input type="email" id="register-email" placeholder="Email" required>
        <input type="password" id="register-password" placeholder="Password" required>
        <button type="submit">Register</button>
      </form>

      <div id="auth-error"></div>
    </section>

    <section id="dashboard" style="display:none">
      <p>Welcome, <span id="user-email"></span>! <button onclick="logout()">Logout</button></p>

      <hr>

      <h2>Create Family</h2>
      <form id="create-family-form">
        <input type="text" id="family-name" placeholder="Family name" required>
        <button type="submit">Create</button>
      </form>

      <h2>Join Family</h2>
      <form id="join-family-form">
        <input type="text" id="invite-code" placeholder="Invite code" required>
        <button type="submit">Join</button>
      </form>

      <hr>

      <h2>My Families</h2>
      <div id="family-list"></div>

      <div id="family-detail"></div>

      <div id="dashboard-stats" class="stats-row"></div>

      <hr>

      <h2>Create Challenge</h2>
      <form id="create-challenge-form">
        <input type="text" id="challenge-title" placeholder="Challenge title" required>
        <input type="text" id="challenge-description" placeholder="Description">
        <label>Type:
          <select id="challenge-type">
            <option value="SelfOnly">Personal Challenge</option>
            <option value="FamilyWide">Family Challenge</option>
          </select>
        </label>
        <label id="family-select-group" style="display:none">Family:
          <select id="challenge-family"><option value="">Select a family...</option></select>
        </label>
        <input type="text" id="challenge-goals" placeholder="Goals (comma-separated)">
        <input type="text" id="challenge-prizes" placeholder="Prizes (comma-separated)">
        <input type="text" id="challenge-currency" placeholder="Currency name (optional, e.g. Ice Cream Points)">
        <button type="submit">Create</button>
      </form>

      <h2>My Challenges</h2>
      <div id="challenge-list"></div>
      <div id="challenge-progress"></div>

      <hr>

      <h2>Achievements (<span id="achievement-count">0</span>)</h2>
      <div id="achievement-list">Loading...</div>
    </section>
  </main>
  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
