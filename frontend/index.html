<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="/manifest.json">
  <title>Glasstrut</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800">

  <!-- ========== AUTH VIEW ========== -->
  <section id="auth-section" class="min-h-screen bg-slate-50 px-5 pt-16 pb-8 flex flex-col">
    <div class="text-center mb-10">
      <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">Welcome to</p>
      <h1 class="text-4xl font-extrabold text-indigo-950">Glasstrut ✨</h1>
      <p class="text-slate-500 mt-2 text-sm">Family challenges & rewards</p>
    </div>

    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 max-w-sm mx-auto w-full">
      <form id="login-form">
        <h2 class="text-xl font-bold text-slate-800 mb-4" id="auth-form-title">Log In</h2>

        <div class="mb-4">
          <label class="text-sm font-semibold text-slate-700">Email</label>
          <div class="flex items-center gap-3 mt-1">
            <span class="h-6 w-6 text-slate-500 flex items-center justify-center text-lg">📧</span>
            <input type="email" id="auth-email" placeholder="your@email.com" required
              class="w-full py-4 px-3 bg-slate-100 text-slate-800 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          </div>
          <div id="email-validation" class="text-xs font-medium text-green-600 mt-1 hidden">✅ Valid Email</div>
        </div>

        <div class="mb-6">
          <label class="text-sm font-semibold text-slate-700">Password</label>
          <div class="flex items-center gap-3 mt-1">
            <span class="h-6 w-6 text-slate-500 flex items-center justify-center text-lg">🔒</span>
            <input type="password" id="auth-password" placeholder="Your password" required
              class="w-full py-4 px-3 bg-slate-100 text-slate-800 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          </div>
        </div>

        <div id="auth-error" class="text-sm text-red-600 mb-3 hidden"></div>

        <button type="submit" id="auth-submit-btn"
          class="w-full py-4 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 active:bg-green-700 transition-colors flex items-center justify-center text-lg">
          LOG IN
        </button>
      </form>

      <p id="auth-toggle" class="text-sm text-center mt-6">
        <span class="text-slate-500">No account yet?</span>
        <button type="button" onclick="toggleAuthForm()" class="font-bold text-indigo-600 ml-1">CREATE AN ACCOUNT</button>
      </p>
    </div>
  </section>

  <!-- ========== DASHBOARD ========== -->
  <section id="dashboard" class="hidden pb-24">

    <!-- HOME TAB -->
    <div id="tab-home" class="block">
      <header class="px-5 pt-12 pb-6 bg-white shadow-sm rounded-b-3xl">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-sm font-medium text-slate-500 uppercase tracking-wider" id="greeting-day">Happy Tuesday</p>
            <h1 class="text-3xl font-extrabold text-indigo-950">Hi, <span id="user-name">User</span>! 👋</h1>
          </div>
          <div class="flex flex-col items-center">
            <div class="h-12 w-12 rounded-full bg-indigo-100 flex items-center justify-center text-xl shadow-inner" id="user-avatar">👤</div>
            <span class="mt-1 font-bold text-sm text-indigo-600" id="user-points">0 🍦</span>
          </div>
        </div>
      </header>

      <section class="mt-8 px-5">
        <div class="flex justify-between items-baseline mb-3">
          <h2 class="text-xl font-bold text-slate-800">Up Next</h2>
        </div>
        <div id="up-next-list" class="flex overflow-x-auto gap-4 pb-4 snap-x hide-scrollbar">
          <!-- populated by JS -->
        </div>
      </section>

      <section class="mt-6 px-5">
        <div class="flex justify-between items-baseline mb-4">
          <h2 class="text-xl font-bold text-slate-800">Family Chronicles</h2>
          <span class="text-xs font-semibold text-green-500 flex items-center gap-1">
            <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span> Live
          </span>
        </div>
        <div id="chronicle-feed" class="flex flex-col gap-3">
          <!-- populated by JS -->
        </div>
      </section>
    </div>

    <!-- QUESTS TAB -->
    <div id="tab-quests" class="hidden px-5 pt-8">
      <div class="flex justify-between items-baseline mb-4">
        <h2 class="text-xl font-bold text-slate-800">Quests</h2>
        <button onclick="showCreateChallengeForm()" class="text-sm font-bold bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700 transition-colors">+ Create challenge</button>
      </div>
      <div id="challenge-list" class="flex flex-col gap-3">
        <!-- populated by JS -->
      </div>
      <div id="challenge-progress"></div>
    </div>

    <!-- TREASURY TAB -->
    <div id="tab-treasury" class="hidden px-5 pt-8">
      <div class="flex justify-between items-baseline mb-4">
        <h2 class="text-xl font-bold text-slate-800">Treasury</h2>
      </div>
      <button onclick="openScanner()" class="w-full py-4 mb-4 bg-indigo-100 text-indigo-700 font-bold rounded-xl hover:bg-indigo-200 active:bg-indigo-300 transition-colors flex items-center justify-center gap-2 text-lg">
        📷 Scan QR Code
      </button>
      <div id="treasury-prizes" class="flex flex-col gap-3">
        <!-- populated by JS -->
      </div>
      <div id="claims-list" class="flex flex-col gap-3 mt-6"></div>
    </div>

    <!-- PROFILE TAB -->
    <div id="tab-profile" class="hidden px-5 pt-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="h-16 w-16 rounded-full bg-indigo-100 flex items-center justify-center text-2xl shadow-inner" id="profile-avatar">👤</div>
        <div>
          <h2 class="text-xl font-bold text-slate-800" id="profile-name">User</h2>
          <p class="text-sm text-slate-500" id="profile-email"></p>
        </div>
      </div>

      <h3 class="text-lg font-bold text-slate-800 mb-3">Achievements (<span id="achievement-count">0</span>)</h3>
      <div id="achievement-list" class="flex flex-col gap-2 mb-6">Loading...</div>

      <hr class="border-slate-200 my-6">

      <h3 class="text-lg font-bold text-slate-800 mb-3">My Families</h3>
      <form id="create-family-form" class="mb-3">
        <div class="flex gap-2">
          <input type="text" id="family-name" placeholder="Family name" required
            class="flex-1 py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <button type="submit" class="py-3 px-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors">Create</button>
        </div>
      </form>
      <form id="join-family-form" class="mb-4">
        <div class="flex gap-2">
          <input type="text" id="invite-code" placeholder="Invite code" required
            class="flex-1 py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <button type="submit" class="py-3 px-4 bg-white text-indigo-700 font-bold rounded-xl border-2 border-indigo-200 hover:bg-indigo-50 transition-colors">Join</button>
        </div>
      </form>
      <div id="family-list" class="flex flex-col gap-2"></div>
      <div id="family-detail"></div>

      <hr class="border-slate-200 my-6">

      <button onclick="logout()" class="w-full py-4 bg-red-50 text-red-600 font-bold rounded-xl border-2 border-red-200 hover:bg-red-100 transition-colors">Logout</button>
    </div>

    <!-- Create Challenge Modal -->
    <div id="create-challenge-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-3xl p-6 shadow-lg max-w-md w-full max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-slate-800">Create Challenge</h3>
          <button onclick="closeCreateChallengeForm()" class="text-slate-500 text-2xl leading-none">&times;</button>
        </div>
        <form id="create-challenge-form" class="flex flex-col gap-3">
          <input type="text" id="challenge-title" placeholder="Challenge title" required
            class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <input type="text" id="challenge-description" placeholder="Description"
            class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <div>
            <label class="text-sm font-semibold text-slate-700">Type</label>
            <select id="challenge-type"
              class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
              <option value="SelfOnly">Personal Challenge</option>
              <option value="FamilyWide">Family Challenge</option>
            </select>
          </div>
          <div id="family-select-group" class="hidden">
            <label class="text-sm font-semibold text-slate-700">Family</label>
            <select id="challenge-family"
              class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
              <option value="">Select a family...</option>
            </select>
          </div>
          <input type="text" id="challenge-goals" placeholder="Goals (comma-separated)"
            class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <input type="text" id="challenge-prizes" placeholder="Prizes (comma-separated)"
            class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <input type="text" id="challenge-currency" placeholder="Currency name (optional, e.g. Ice Cream Points)"
            class="w-full py-3 px-3 bg-slate-100 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-300 outline-none">
          <button type="submit" class="w-full py-4 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 transition-colors">Create</button>
        </form>
      </div>
    </div>

  </section>

  <!-- ========== BOTTOM NAV ========== -->
  <nav id="bottom-nav" class="hidden fixed bottom-0 w-full max-w-lg mx-auto bg-white border-t border-slate-200 pb-safe pt-2 px-6 flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50 left-1/2 -translate-x-1/2">
    <button onclick="switchTab('home')" class="tab-btn flex flex-col items-center p-2 text-indigo-600" data-tab="home">
      <svg class="w-7 h-7 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="text-[10px] font-bold">Home</span>
    </button>
    <button onclick="switchTab('quests')" class="tab-btn flex flex-col items-center p-2 text-slate-400 transition-colors" data-tab="quests">
      <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span class="text-[10px] font-bold">Quests</span>
    </button>
    <button onclick="switchTab('treasury')" class="tab-btn flex flex-col items-center p-2 text-slate-400 transition-colors" data-tab="treasury">
      <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span class="text-[10px] font-bold">Treasury</span>
    </button>
    <button onclick="switchTab('profile')" class="tab-btn flex flex-col items-center p-2 text-slate-400 transition-colors" data-tab="profile">
      <svg class="w-7 h-7 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
      <span class="text-[10px] font-bold">Profile</span>
    </button>
  </nav>

  <script src="/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
