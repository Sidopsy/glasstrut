<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="/manifest.json">
  <title>Glasstrut</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>Glasstrut</h1>
    <nav>
      <a href="/">Home</a>
    </nav>
  </header>
  <main>
    <p>Welcome to Glasstrut — family challenges made simple.</p>

    <section id="auth-section">
      <h2>Login</h2>
      <form hx-post="/api/auth/login" hx-target="#auth-result" hx-swap="innerHTML"
            hx-on::after-request="if(event.detail.successful) handleAuthResponse(this, event.detail.xhr.response)">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <h2>Register</h2>
      <form hx-post="/api/auth/register" hx-target="#auth-result" hx-swap="innerHTML"
            hx-on::after-request="if(event.detail.successful) handleAuthResponse(this, event.detail.xhr.response)">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
      </form>

      <div id="auth-result"></div>
    </section>

    <div hx-get="/api/health" hx-trigger="load">
      Checking backend connection...
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
